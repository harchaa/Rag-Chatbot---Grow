# Factual evaluation set — Phase 6
# Each question must be answered (not refused) with the correct fact and citation.
#
# Fields:
#   id               short stable identifier
#   question         the query sent to the pipeline
#   expected_source  substring that must appear in the citation_url
#   expected_fact    substring that must appear (case-insensitive) in the answer
#   fact_type        what kind of fact is being tested

questions:

  # ── HDFC Mid Cap Fund ───────────────────────────────────────────────────────
  - id: f01
    question: "What is the expense ratio of HDFC Mid Cap Fund?"
    expected_source: hdfc-mid-cap
    expected_fact: "0.73"
    fact_type: expense_ratio

  - id: f02
    question: "What is the exit load for HDFC Mid Cap Fund?"
    expected_source: hdfc-mid-cap
    expected_fact: "1%"
    fact_type: exit_load

  - id: f03
    question: "Who is the fund manager of HDFC Mid Cap Fund?"
    expected_source: hdfc-mid-cap
    expected_fact: "Chirag Setalvad"
    fact_type: fund_manager

  - id: f04
    question: "Is there a lock-in period for HDFC Mid Cap Fund?"
    expected_source: hdfc-mid-cap
    expected_fact: "lock-in"
    fact_type: lock_in

  # ── HDFC Small Cap Fund ─────────────────────────────────────────────────────
